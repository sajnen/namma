<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Namma Nildana — Bus Stop Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="map-page">

<div id="appContainer" class="app-container">
  <div class="header">
    <div>
      <h1>Namma Nildana</h1>
      <div class="subtitle">Bus Stop Accessibility Survey — Sarjapur Road Corridor</div>
    </div>
    <div class="map-select">
      <label for="mapStyle">Map style</label>
      <select id="mapStyle">
        <option value="osm">OpenStreetMap</option>
        <option value="carto">CartoDB Positron</option>
      </select>
    </div>
    <button id="aboutBtn" class="about-button">About Project</button>
    <div class="stats">
      <div><div class="stat-num" id="stat-total">–</div> Total Stops</div>
      <div><div class="stat-num" id="stat-mapped">–</div> Mapped</div>
      <div><div class="stat-num" id="stat-existing">–</div> Existing</div>
    </div>
  </div>

  <div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <input type="text" id="search" placeholder="Search bus stops…" />
    </div>
    <ul class="place-list" id="placeList"></ul>
  </div>

  <div class="main">
    <div id="map"></div>

    <div class="desc-panel" id="descPanel">
      <div class="desc-header">
        <div>
          <h2 id="descTitle"></h2>
          <div class="desc-coords" id="descCoords"></div>
        </div>
        <button class="desc-close" id="descClose">&times;</button>
      </div>
      <div class="desc-body" id="descBody"></div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2e86c1"></div> Existing bus stop</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> No existing bus stop</div>
      <div class="legend-item"><div class="legend-dot" style="background:#aaa"></div> No coordinates</div>
    </div>
  </div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const places = [{"place": "Sarjapur Police Station (TO IBLUR)", "latitude": 12.8608847521621, "longitude": 77.78325394165, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "No information", "camera_surveillance": "No", "signage": "Inadequate signage", "roof": "Yes", "continuous_pathway": "No"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "Can be improved, garbage lying around and near bus stop, general dust, tiles are broken"}}, {"place": "Sompura Gate (TO IBLUR)", "latitude": 12.8621580536302, "longitude": 77.7718955985368, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Well maintained", "camera_surveillance": "Yes", "signage": "No information", "roof": "Yes", "continuous_pathway": "No"}, "accessibility": {"wheelchair_entryway": "No", "access_blocked": "Accessibility into bus stop blocked by vendors/cars etc", "tactile_pathway": "No"}, "cleanliness": "fairly clean, not littered. However, very dusty"}}, {"place": "Crystal Apartments (TO IBLUR)", "latitude": 12.8677947517579, "longitude": 77.7669563144035, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "No", "camera_surveillance": "No", "signage": "No information", "roof": "Yes", "continuous_pathway": "No"}, "accessibility": {"wheelchair_entryway": "Yes, but no designated ramp", "space_for_wheelchair_parking": "Yes, but can be improved", "tactile_pathway": "No"}, "cleanliness": "Very poorly maintained due to disuse"}}, {"place": "Yamare Village (TO IBLUR)", "latitude": 12.8724995252241, "longitude": 77.7663024155139, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Chembenahalli (TO IBLUR)", "latitude": 12.8794926615078, "longitude": 77.7615610462864, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Breakage, obstruction", "camera_surveillance": "No", "signage": "No information", "roof": "Yes", "continuous_pathway": "No"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "Very dusty and obstruction in terms of rocks/mud in and around the bus stop."}}, {"place": "T.C. Halli bus stop (TO IBLUR)", "latitude": 12.8817237096177, "longitude": 77.7569002417885, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes, but can be improved", "flooring": "Breakage, obstruction", "camera_surveillance": "No", "signage": "Inadequate signage", "roof": "Yes", "continuous_pathway": "No"}, "accessibility": {"wheelchair_entryway": "No", "access_blocked": "Accessibility into bus stop blocked by vendors/cars etc", "tactile_pathway": "No"}, "cleanliness": "Bus stop itself is fairly maintained but is surrounded by debris and vendors and parked vehicles making it hard to access."}}, {"place": "Dommasandra (TO IBLUR)", "latitude": 12.8796880851133, "longitude": 77.7537429870165, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Dommasandra Circle (TO IBLUR)", "latitude": 12.8837258694333, "longitude": 77.7522927757382, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Muthanallur Cross (TO IBLUR)", "latitude": 12.8875457607502, "longitude": 77.7379668155307, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes but can be improved", "flooring": "No", "camera_surveillance": "No", "signage": "No information", "roof": "Yes", "continuous_pathway": "No"}, "accessibility": {"wheelchair_entryway": "No", "access_blocked": "Accessibility into bus stop blocked by vendors/cars etc", "tactile_pathway": "No"}, "cleanliness": "The bus stop is practically non functional because of how dirty it is, people stand outside the bus stop. It is filled with debris and vendors have set up storage within the stop."}}, {"place": "Sulikunte (TO IBLUR)", "latitude": 12.8923176064902, "longitude": 77.728506542913, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Well-maintained", "camera_surveillance": "No", "signage": "No information", "roof": "Yes but can be improved", "continuous_pathway": "No information"}, "accessibility": {"wheelchair_entryway": "No", "access_blocked": "Accessibility into bus stop blocked by vendors/cars etc", "tactile_pathway": "No"}, "cleanliness": "Bus stop is well maintained and clean but surroundings is not"}}, {"place": "Ambedkar Nagar (TO IBLUR)", "latitude": 12.8993331250136, "longitude": 77.7126327750527, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Well-maintained", "camera_surveillance": "No", "signage": "Signboard", "roof": "Yes", "continuous_pathway": "Yes"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "Very well maintained and clean."}}, {"place": "Carmelram gate (TO IBLUR)", "latitude": 12.9034751003314, "longitude": 77.7039266303969, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Well-maintained", "camera_surveillance": "No", "signage": "No information", "roof": "Yes", "continuous_pathway": "Yes"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "Slightly littered, and dusty."}}, {"place": "Doddakannali (TO IBLUR)", "latitude": 12.9072064670436, "longitude": 77.6953856915663, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Well-maintained", "camera_surveillance": "No", "signage": "No information", "roof": "Yes, but can be improved", "continuous_pathway": "Yes"}, "accessibility": {"wheelchair_entryway": "No", "access_blocked": "Accessibility into bus stop blocked by vendors/cars etc", "tactile_pathway": "No"}, "cleanliness": "Dusty, but not littered"}}, {"place": "Junnasandra gate Wipro regional office (TO IBLUR)", "latitude": 12.9108360518034, "longitude": 77.6839888840508, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Wellmaintained", "camera_surveillance": "No", "signage": "Signboard", "roof": "Yes", "continuous_pathway": "Yes"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "Clean, not very dusty"}}, {"place": "Kaikondrahalli (TO IBLUR)", "latitude": 12.9142791928381, "longitude": 77.6773413772272, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Breakage, obstruction", "camera_surveillance": "No", "signage": "No information", "roof": "Yes", "continuous_pathway": "Yes, but can be improved"}, "accessibility": {"wheelchair_entryway": "Broken", "space_for_wheelchair_parking": "No", "tactile_pathway": "Yes but can be improved"}, "cleanliness": "Very dusty otherwise maintained"}}, {"place": "Bellandur gate (TO IBLUR)", "latitude": 12.9188752023854, "longitude": 77.6693375351398, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Breakage, obstruction", "camera_surveillance": "No", "signage": "No information", "roof": "Yes", "continuous_pathway": "Yes, but can be improved"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "Clean, no litter, not dusty"}}, {"place": "Sarjapura road Ibbaluru junction (TO IBLUR)", "latitude": 12.9206323985912, "longitude": 77.66499503106, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Sarjapura Circle BNG (TO IBLUR)", "latitude": 12.9043099764847, "longitude": 77.7028699102322, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Wellmaintained", "camera_surveillance": "No", "signage": "No information", "roof": "Yes", "continuous_pathway": "Yes"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "Clean mostly, littered in the back"}}, {"place": "Sarjapur Police Station (TO SARJAPUR)", "latitude": 12.8611805049297, "longitude": 77.783074845587, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Sompura Gate (TO SARJAPUR)", "latitude": 12.8621675327047, "longitude": 77.7721530945125, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Crystal Apartments (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "No information", "camera_surveillance": "No", "signage": "No information", "roof": "Broken", "continuous_pathway": "No information"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "Non-existent practically. In high disuse so the roof and tiling is all broken."}}, {"place": "Yamare Village (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes, but can be improved", "flooring": "No", "camera_surveillance": "No", "signage": "No", "roof": "Yes", "continuous_pathway": "No"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "In disuse, so very dusty and not well-maintained at all"}}, {"place": "Chembenahalli (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "T.C. Halli bus stop (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Dommasandra (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Dommasandra Circle (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Muthanallur Cross (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Sulikunte (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Well-maintained", "camera_surveillance": "No", "signage": "Inadaquate signage", "roof": "Yes but can be improved", "continuous_pathway": "No"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "Generally well maintained and clean"}}, {"place": "Ambedkar Nagar (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "existing bus stop", "facilities": {"seating": "Broken", "flooring": "Well-maintained", "camera_surveillance": "No", "signage": "No information", "roof": "Yes", "continuous_pathway": "No"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "Very dusty and garbage is just lying around"}}, {"place": "Carmelram gate (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "unknown", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Doddakannali (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "existing bus stop", "facilities": {"seating": "Broken", "flooring": "No built floor", "camera_surveillance": "No", "signage": "Digital", "roof": "Yes but can be improved", "continuous_pathway": "Yes but can be improved"}, "accessibility": {"wheelchair_entryway": "No", "access_blocked": "Accessibility into bus stop blocked by vendors/cars etc", "tactile_pathway": "No"}, "cleanliness": "No information"}}, {"place": "Junnasandra gate Wipro regional office (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "No built floor", "camera_surveillance": "No", "signage": "No information", "roof": "Yes", "continuous_pathway": "Yes, but can be improved"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No"}, "cleanliness": "Littered"}}, {"place": "Kaikondrahalli (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Bellandur gate (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Sarjapura road Ibbaluru junction (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "no existing bus stop", "facilities": {}, "accessibility": {}, "cleanliness": ""}}, {"place": "Sarjapura Circle BNG (TO SARJAPUR)", "latitude": null, "longitude": null, "description": {"status": "existing bus stop", "facilities": {"seating": "Yes", "flooring": "Well-maintained", "camera_surveillance": "No", "signage": "Signboard", "roof": "Yes", "continuous_pathway": "Yes"}, "accessibility": {"wheelchair_entryway": "No", "tactile_pathway": "No i"}, "cleanliness": "Overall clean"}}];

  let panel;

  function initApp() {
    try {
      console.log('initApp starting');
      if (!window.L) throw new Error('Leaflet library not loaded');
      if (!document.getElementById('map')) throw new Error('Map container missing');
      const mapped = places.filter(p => p.latitude != null);
      const existing = places.filter(p => p.description.status === 'existing bus stop');
    document.getElementById('stat-total').textContent = places.length;
    document.getElementById('stat-mapped').textContent = mapped.length;
    document.getElementById('stat-existing').textContent = existing.length;

    // Map
    const map = L.map('map').setView([12.895, 77.74], 13);

  const tileOptions = {
    osm: {
      url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      attribution: '&copy; OpenStreetMap contributors'
    },
    'osm-humanitarian': {
      url: 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
      attribution: '&copy; OpenStreetMap contributors, Humanitarian'
    },
    carto: {
      url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
      attribution: '&copy; OpenStreetMap contributors &amp; CARTO'
    },
    'stamen-toner': {
      url: 'https://stamen-tiles.a.ssl.fastly.net/toner/{z}/{x}/{y}.png',
      attribution: 'Map tiles by Stamen Design, CC BY 3.0 — Map data © OpenStreetMap contributors'
    }
  };

  let currentTileLayer;
  const tileSelect = document.getElementById('mapStyle');
  if (!tileSelect) throw new Error('Map style selector missing');

  function setTileLayer(key) {
    if (currentTileLayer) {
      map.removeLayer(currentTileLayer);
    }
    currentTileLayer = L.tileLayer(tileOptions[key].url, {
      attribution: tileOptions[key].attribution,
      maxZoom: 19
    }).addTo(map);
  }

  setTileLayer(tileSelect.value);
  tileSelect.addEventListener('change', e => setTileLayer(e.target.value));
  document.getElementById('aboutBtn').addEventListener('click', () => {
    window.location.href = 'index.html';
  });

  // Custom markers
  function makeIcon(color) {
    return L.divIcon({
      className: '',
      html: '<div style="display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:' + color + ';color:#fff;font-size:14px;line-height:1;box-shadow:0 1px 6px rgba(0,0,0,0.25)">🚍</div>',
      iconSize: [22, 22],
      iconAnchor: [11, 22]
    });
  }
  const iconExisting = makeIcon('#2e86c1');
  const iconNone = makeIcon('#e74c3c');

  const markers = [];

  mapped.forEach(place => {
    const isExisting = place.description.status === 'existing bus stop';
    const marker = L.marker([place.latitude, place.longitude], {
      icon: isExisting ? iconExisting : iconNone
    }).addTo(map);

    marker.on('click', () => showDescription(place));
    markers.push({ marker, place });
  });

  // Fit bounds
  if (mapped.length > 0) {
    const bounds = L.latLngBounds(mapped.map(p => [p.latitude, p.longitude]));
    map.fitBounds(bounds, { padding: [40, 40] });
    setTimeout(() => map.invalidateSize(), 200);
  }

  // Sidebar list
  const listEl = document.getElementById('placeList');

  function searchText(place) {
    const d = place.description;
    return [place.place, d.status, d.cleanliness,
      ...Object.values(d.facilities), ...Object.values(d.accessibility)
    ].join(' ').toLowerCase();
  }

  function renderList(filter) {
    listEl.innerHTML = '';
    const q = (filter || '').toLowerCase();
    places.forEach((place, idx) => {
      if (q && !searchText(place).includes(q)) return;

      const li = document.createElement('li');
      li.className = 'place-item' + (place.latitude == null ? ' no-coords' : '');
      li.dataset.idx = idx;

      const isExisting = place.description.status === 'existing bus stop';
      const hasCoords = place.latitude != null;

      let dotClass = 'place-dot';
      if (!hasCoords) dotClass += ' no-coords';
      else if (!isExisting) dotClass += ' no-bus-stop';

      li.innerHTML =
        '<div class="' + dotClass + '"></div>' +
        '<span class="place-name">' + escapeHtml(place.place) + '</span>' +
        (!hasCoords ? '<span class="place-tag missing">no coords</span>' : '');

      li.addEventListener('click', () => {
        document.querySelectorAll('.place-item.active').forEach(el => el.classList.remove('active'));
        li.classList.add('active');
        if (hasCoords) {
          map.setView([place.latitude, place.longitude], 16, { animate: true });
        }
        showDescription(place);
      });

      listEl.appendChild(li);
    });
  }

  renderList('');
  document.getElementById('search').addEventListener('input', e => renderList(e.target.value));

  // Description panel
  panel = document.getElementById('descPanel');
  document.getElementById('descClose').addEventListener('click', () => panel.classList.remove('visible'));
  } catch (err) {
    console.error('initApp error', err);
    document.body.insertAdjacentHTML('afterbegin', '<div style="padding:20px;background:#fee;color:#900;font-family:sans-serif;">Error initializing map: ' + err.message + '</div>');
  }
  }

  function showDescription(place) {
    document.getElementById('descTitle').textContent = place.place;
    document.getElementById('descCoords').textContent =
      place.latitude != null
        ? place.latitude.toFixed(6) + ', ' + place.longitude.toFixed(6)
        : 'Coordinates not available';

    document.getElementById('descBody').innerHTML = renderDescription(place.description);
    panel.classList.add('visible');

    // Highlight sidebar
    document.querySelectorAll('.place-item.active').forEach(el => el.classList.remove('active'));
    const items = document.querySelectorAll('.place-item');
    items.forEach(li => {
      const idx = parseInt(li.dataset.idx);
      if (places[idx] === place) {
        li.classList.add('active');
        li.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    });
  }

  function renderDescription(desc) {
    if (!desc || desc.status === 'unknown') return '<em>No description available</em>';

    if (desc.status === 'no existing bus stop') {
      return '<span class="status-badge none">No Existing Bus Stop</span>';
    }

    let html = '<span class="status-badge existing">Existing Bus Stop</span>';

    // Facilities
    if (Object.keys(desc.facilities).length > 0) {
      html += '<div class="section-title">Facilities</div>';
      for (const [key, val] of Object.entries(desc.facilities)) {
        const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        html += '<div class="field"><span class="field-label">' + escapeHtml(label) +
                '</span><span class="field-value">' + escapeHtml(val) + '</span></div>';
      }
    }

    // Accessibility
    if (Object.keys(desc.accessibility).length > 0) {
      html += '<div class="section-title">Accessibility</div>';
      for (const [key, val] of Object.entries(desc.accessibility)) {
        const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        html += '<div class="field"><span class="field-label">' + escapeHtml(label) +
                '</span><span class="field-value">' + escapeHtml(val) + '</span></div>';
      }
    }

    // Cleanliness
    if (desc.cleanliness) {
      html += '<div class="section-title">Cleanliness</div>';
      html += '<div>' + escapeHtml(desc.cleanliness) + '</div>';
    }

    return html;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  if (document.readyState === 'loading') {
    window.addEventListener('DOMContentLoaded', initApp);
  } else {
    initApp();
  }
</script>
</body>
</html>
