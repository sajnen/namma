<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Namma Nildana — Bus Stop Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="map-page">

<header class="site-header">
  <div class="site-title">
    <h1>Namma Nildana</h1>
    <p class="site-tagline">Bus stop accessibility survey for the Sarjapur Road corridor</p>
  </div>
  <button id="navToggle" class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <nav id="topNav" class="top-nav">
    <button class="nav-close">&times;</button>    <a href="map.html">Home</a>    <a href="index.html">About</a>
    <a href="#map" class="active">Map</a>
    <a href="index.html#contact">Contact</a>
  </nav>
</header>

<div id="appContainer" class="app-container">
  <div class="header">
    <div class="map-label">
      <strong>Map view</strong>
    </div>    <button id="openSurveyBtn" class="survey-button">Feedback</button>    <button id="sidebarToggle" class="sidebar-toggle" aria-expanded="true" aria-label="Toggle sidebar">☰</button>
    <div class="stats">
      <div><div class="stat-num" id="stat-total">â€“</div> Total Stops</div>
    </div>
  </div>

  <div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <input type="text" id="search" placeholder="Search Bus Stop" />
      <button class="sidebar-close" aria-label="Close sidebar">&times;</button>
    </div>
    <ul class="place-list" id="placeList"></ul>
  </div>

  <div class="main">
    <div id="map"></div>

    <div class="desc-panel" id="descPanel">
      <div class="desc-header">
        <div>
          <h2 id="descTitle"></h2>
          <div class="desc-coords" id="descCoords"></div>
        </div>
        <button class="desc-close" id="descClose">&times;</button>
      </div>
      <div class="desc-body" id="descBody"></div>
    </div>

    <div class="legend">
      <div class="legend-item"><img src="green_marker.png" alt="Bus stop shelter exists" style="width:22px;height:22px;"> Bus stop shelter exists</div>
      <div class="legend-item"><img src="red_marker.png" alt="No existing Bus stop shelter" style="width:22px;height:22px;"> No existing Bus stop shelter</div>
      <div class="legend-item"><div class="legend-dot" style="background:#aaa"></div> No coordinates</div>
    </div>
  </div>
</div>
</div>

<!-- Survey Modal -->
<div id="surveyModal" class="survey-modal">
  <div class="survey-overlay"></div>
  <div class="survey-container">
    <div class="survey-header">
      <h2>Feedback Survey</h2>
      <button class="survey-close" id="surveyClosed">&times;</button>
    </div>
    <form id="surveyForm" class="survey-form">
      <div id="formMessage" class="form-message"></div>
      
      <div class="form-group">
        <label for="surveyEmail">Email <span class="required">*</span></label>
        <input 
          type="email" 
          id="surveyEmail" 
          name="email" 
          placeholder="your.email@example.com" 
          required
        />
      </div>

      <div class="form-group">
        <label for="surveyPhone">Phone Number (Optional)</label>
        <input 
          type="tel" 
          id="surveyPhone" 
          name="phone" 
          placeholder="+91 98765 43210"
        />
      </div>

      <div class="form-group">
        <label for="surveyFeedback">Your Feedback <span class="required">*</span></label>
        <textarea 
          id="surveyFeedback" 
          name="feedback" 
          placeholder="Share your thoughts on bus stop accessibility..." 
          rows="5"
          required
        ></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit" id="submitBtn">Submit Feedback</button>
        <button type="button" class="btn-cancel" id="surveyCancelBtn">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.getElementById('navToggle');
    const nav = document.getElementById('topNav');
    if (toggle && nav) {
      const closeNav = () => {
        nav.classList.remove('open');
        toggle.setAttribute('aria-expanded', false);
        toggle.textContent = '☰';
        document.removeEventListener('click', handleOutsideClick);
      };
      const handleOutsideClick = (e) => {
        if (!nav.contains(e.target) && !toggle.contains(e.target)) {
          closeNav();
        }
      };
      toggle.addEventListener('click', function() {
        const open = nav.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
        toggle.textContent = open ? '×' : '☰';
        if (open) {
          setTimeout(() => document.addEventListener('click', handleOutsideClick), 0);
        } else {
          document.removeEventListener('click', handleOutsideClick);
        }
      });
    }

    const navClose = document.querySelector('.nav-close');
    if (navClose && nav) {
      navClose.addEventListener('click', function() {
        nav.classList.remove('open');
        toggle.setAttribute('aria-expanded', false);
        toggle.textContent = '☰';
        document.removeEventListener('click', handleOutsideClick);
      });
    }

    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebar = document.querySelector('.sidebar');
    if (sidebarToggle && sidebar) {
      const closeSidebar = () => {
        sidebar.classList.remove('visible');
        sidebarToggle.setAttribute('aria-expanded', false);
        sidebarToggle.textContent = '☰';
        document.removeEventListener('click', handleSidebarOutsideClick);
      };
      const handleSidebarOutsideClick = (e) => {
        if (!sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) {
          closeSidebar();
        }
      };
      sidebarToggle.addEventListener('click', function() {
        const visible = sidebar.classList.toggle('visible');
        sidebarToggle.setAttribute('aria-expanded', visible);
        sidebarToggle.textContent = visible ? '×' : '☰';
        if (visible) {
          setTimeout(() => document.addEventListener('click', handleSidebarOutsideClick), 0);
        } else {
          document.removeEventListener('click', handleSidebarOutsideClick);
        }
      });
    }

    const sidebarClose = document.querySelector('.sidebar-close');
    if (sidebarClose && sidebar) {
      sidebarClose.addEventListener('click', function() {
        sidebar.classList.remove('visible');
        sidebarToggle.setAttribute('aria-expanded', false);
        sidebarToggle.textContent = '☰';
        document.removeEventListener('click', handleSidebarOutsideClick);
      });
    }
  });
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
