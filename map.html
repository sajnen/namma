<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Namma Nildana — Bus Stop Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="map-page">

<header class="site-header">
  <div class="site-title">
    <h1>Namma Nildana</h1>
    <p class="site-tagline">Bus stop accessibility survey for the Sarjapur Road corridor</p>
  </div>
  <button id="navToggle" class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <nav id="topNav" class="top-nav">
    <a href="index.html">About</a>
    <a href="#map" class="active">Map</a>
    <a href="index.html#data-source">Data source</a>
    <a href="index.html#contact-notes">Contact / notes</a>
    <a href="places.csv" download class="download-link">Download CSV</a>
  </nav>
</header>

<div id="appContainer" class="app-container">
  <div class="header">
    <div class="map-label">
      <strong>Map view</strong>
    </div>
    <div class="map-select">
      <label for="mapStyle">Map style</label>
      <select id="mapStyle">
        <option value="osm">OpenStreetMap</option>
        <option value="carto" selected="selected">CartoDB Positron</option>
      </select>
    </div>
    <button id="aboutBtn" class="about-button">About Project</button>
    <div class="stats">
      <div><div class="stat-num" id="stat-total">â€“</div> Total Stops</div>
    </div>
  </div>

  <div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <input type="text" id="search" placeholder="Search Bus Stop" />
    </div>
    <ul class="place-list" id="placeList"></ul>
  </div>

  <div class="main">
    <div id="map"></div>

    <div class="desc-panel" id="descPanel">
      <div class="desc-header">
        <div>
          <h2 id="descTitle"></h2>
          <div class="desc-coords" id="descCoords"></div>
        </div>
        <button class="desc-close" id="descClose">&times;</button>
      </div>
      <div class="desc-body" id="descBody"></div>
    </div>

    <div class="legend">
      <div class="legend-item"><img src="green_marker.png" alt="Existing bus stop" style="width:22px;height:22px;"> Existing bus stop</div>
      <div class="legend-item"><img src="red_marker.png" alt="No existing bus stop" style="width:22px;height:22px;"> No existing bus stop</div>
      <div class="legend-item"><div class="legend-dot" style="background:#aaa"></div> No coordinates</div>
    </div>
  </div>
</div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.getElementById('navToggle');
    const nav = document.getElementById('topNav');
    if (toggle && nav) {
      toggle.addEventListener('click', function() {
        const open = nav.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
      });
    }
  });
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
