<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Namma Nildana â€” Bus Stop Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="map-page">

<div id="appContainer" class="app-container">
  <div class="header">
    <div>
      <h1>Namma Nildana</h1>
      <div class="subtitle">Bus Stop Accessibility Survey â€” Sarjapur Road Corridor</div>
    </div>
    <div class="map-select">
      <label for="mapStyle">Map style</label>
      <select id="mapStyle">
        <option value="osm">OpenStreetMap</option>
        <option value="carto">CartoDB Positron</option>
      </select>
    </div>
    <button id="aboutBtn" class="about-button">About Project</button>
    <div class="stats">
      <div><div class="stat-num" id="stat-total">â€“</div> Total Stops</div>
      <div><div class="stat-num" id="stat-mapped">â€“</div> Mapped</div>
      <div><div class="stat-num" id="stat-existing">â€“</div> Existing</div>
    </div>
  </div>

  <div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <input type="text" id="search" placeholder="Search bus stopsâ€¦" />
    </div>
    <ul class="place-list" id="placeList"></ul>
  </div>

  <div class="main">
    <div id="map"></div>

    <div class="desc-panel" id="descPanel">
      <div class="desc-header">
        <div>
          <h2 id="descTitle"></h2>
          <div class="desc-coords" id="descCoords"></div>
        </div>
        <button class="desc-close" id="descClose">&times;</button>
      </div>
      <div class="desc-body" id="descBody"></div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2e86c1"></div> Existing bus stop</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> No existing bus stop</div>
      <div class="legend-item"><div class="legend-dot" style="background:#aaa"></div> No coordinates</div>
    </div>
  </div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
